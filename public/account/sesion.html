<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - AutoServicioABC2</title>
</head>
<body>

    <header>
        <nav aria-label="Navegación principal">
            <div class="logo">
                <img src="placeholder-logo.png" alt="Logo de AutoServicio ABC#2">
            </div>
            
            <ul>
                <li><a href="../../Index.html">Inicio</a></li>
                <li><a href="../servicios.html">Servicios</a></li>
                <li><a href="../catalogo.html">Catálogos</a></li>
            </ul>

            <div class="search-bar">
                <form action="/buscar" method="get">
                    <input type="text" placeholder="Encuentra tu repuesto perfecto" aria-label="Buscar repuestos">
                    <button type="submit">search-icon</button>
                </form>
            </div>

            <div class="header-contact">
                <address>
                    <p>Teléfono <a href="tel:63448292">6344-8292</a></p>
                    <p>Whatsapp <a href="tel:65497470">6549-7470</a></p>
                </address>
            </div>

            <div class="header-icons">
                <a href="#" aria-label="Carrito de compras">shop-icon</a>
                <a href="sesion.html" aria-label="Perfil de usuario">account-icon</a>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        
        <!-- Sección: Iniciar Sesión -->
        <section class="login-section" aria-labelledby="login-title">
            <h2 id="login-title">Iniciar Sesión</h2>
            
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="login-user">Usuario o Correo</label>
                    <input type="text" id="login-user" name="username" required>
                </div>

                <div class="form-group">
                    <label for="login-pass">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-pass" name="password" required>
                        <button type="button" aria-label="Mostrar contraseña" class="toggle-pass">
                            <span aria-hidden="true">visible-icon</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Iniciar Sesión</button>

                <div class="form-footer">
                    <p>
                        ¿No tienes cuenta? 
                        <a href="#registro-section" class="btn-link">Regístrate</a>
                    </p>
                    <p>
                        <a href="#">¿Olvidó su contraseña?</a>
                    </p>
                </div>
            </form>
        </section>

        <!-- Sección: Regístrate -->
        <section class="register-section" id="registro-section" aria-labelledby="register-title">
            <h2 id="register-title">Regístrate</h2>
            
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="reg-user">Usuario</label>
                    <input type="text" id="reg-user" name="username" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Correo</label>
                    <input type="email" id="reg-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="reg-pass">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-pass" name="password" required>
                        <button type="button" aria-label="Mostrar contraseña" class="toggle-pass">
                            <span aria-hidden="true">visible-icon</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-pass-confirm">Confirmar contra</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-pass-confirm" name="password_confirmation" required>
                        <button type="button" aria-label="Mostrar contraseña" class="toggle-pass">
                            <span aria-hidden="true">visible-icon</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-secondary">Regístrate</button>
            </form>
        </section>

    </main>

    <!-- Enlace inferior solicitado -->
    <footer class="auth-footer">
        <a href="miCuenta.html">Si tengo cuenta</a>
        <a href="../../admin/admin.html">Soy admin</a>
    </footer>

</body>
</html>
